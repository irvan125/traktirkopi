<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saweria Clone - Dukung Kreator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FA6400; font-family: 'Inter', sans-serif; }
        .font-brand { font-family: 'Lilita One', cursive; }
        .shadow-brutal { box-shadow: 6px 6px 0px 0px #000000; }
        .border-brutal { border: 3px solid #000000; }
    </style>
</head>
<body class="text-black">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
        <div class="text-3xl font-brand tracking-widest text-white">SAWERIA</div>
        <div class="flex items-center gap-4">
            <a href="#" class="font-bold text-white hover:opacity-80">Login</a>
            <button class="bg-black text-white px-6 py-2 rounded-lg font-bold border-brutal hover:bg-white hover:text-black transition">Daftar</button>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-8 py-16 flex flex-col md:flex-row items-center gap-12">
        <div class="md:w-3/5 text-white">
            <h1 class="text-6xl md:text-8xl font-brand leading-none mb-6">
                DUNIA SERU, <br>SAWERAN BARU.
            </h1>
            <p class="text-xl md:text-2xl font-bold mb-8">
                Platform donasi online termudah untuk kreator lokal. Dapatkan dukungan langsung dari fansmu sekarang juga.
            </p>
            <div class="flex gap-4">
                <button class="bg-white text-black px-8 py-4 font-black text-lg border-brutal shadow-brutal hover:shadow-none transition-all">
                    MULAI SEKARANG
                </button>
                <button class="bg-transparent border-2 border-white text-white px-8 py-4 font-bold hover:bg-white/20 transition">
                    PELAJARI LEBIH LANJUT
                </button>
            </div>
        </div>
        
        <div class="md:w-2/5 w-full bg-white p-6 border-brutal shadow-brutal rotate-2">
            <div class="bg-gray-100 p-4 border-2 border-black mb-4">
                <div class="h-10 w-10 bg-orange-500 rounded-full mb-2"></div>
                <div class="h-4 w-32 bg-gray-300 rounded"></div>
            </div>
            <h2 class="text-2xl font-brand mb-2">Terima Donasi!</h2>
            <p class="text-sm">Notifikasi muncul real-time saat ada yang menyawer melalui DANA, GoPay, OVO, atau LinkAja.</p>
        </div>
    </header>

</body>
</html>
